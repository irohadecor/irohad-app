<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#2C2820"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>業績ランキング — Rose Garden Co., Ltd</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#2C2820; --card:#3A342C; --card2:#44382E;
  --gold:#B8986A; --gold-light:#D4B896; --gold-dark:#8C6E42;
  --text:#F2EDE4; --text-sub:#A09488; --text-muted:#6B6158;
  --border:rgba(255,255,255,0.08);
  --green:#2D7A4F; --rose:#C05A6E; --blue:#3A6EA8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Zen Kaku Gothic New',sans-serif;font-weight:300;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* ヘッダー */
.header{background:rgba(0,0,0,0.3);padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);}
.header-brand{font-family:'Fraunces',serif;font-size:10px;letter-spacing:0.3em;color:var(--gold-light);text-transform:uppercase;margin-bottom:4px;}
.header-title{font-family:'Shippori Mincho',serif;font-size:22px;font-weight:700;color:var(--text);letter-spacing:0.04em;}

/* GAS設定バー */
.gas-bar{background:rgba(184,152,106,0.08);border-bottom:1px solid rgba(184,152,106,0.15);padding:8px 1.5rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.gas-input{flex:1;min-width:200px;font-family:monospace;font-size:11px;padding:6px 10px;border:1px solid rgba(255,255,255,0.1);border-radius:3px;background:rgba(255,255,255,0.05);color:var(--text);}
.gas-input:focus{outline:none;border-color:var(--gold);}
.gas-btn{padding:6px 14px;background:var(--gold);color:#fff;border:none;border-radius:3px;font-size:11px;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;white-space:nowrap;transition:all 0.2s;}
.gas-btn:hover{background:var(--gold-dark);}
.gas-btn.secondary{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);}
.gas-status{font-size:11px;color:var(--gold-light);}

/* 期間フィルター */
.period-tabs{display:flex;gap:6px;padding:1rem 1.5rem 0;overflow-x:auto;}
.period-tab{padding:6px 16px;border-radius:99px;font-size:12px;font-weight:500;border:1px solid rgba(255,255,255,0.1);color:var(--text-muted);cursor:pointer;background:none;white-space:nowrap;transition:all 0.2s;font-family:'Zen Kaku Gothic New',sans-serif;}
.period-tab.active{background:var(--gold);border-color:var(--gold);color:#fff;}

.main{max-width:600px;margin:0 auto;padding:1.25rem 1.5rem 5rem;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1.25rem;}
.kpi-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
.kpi-label{font-size:10px;letter-spacing:0.1em;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px;}
.kpi-val{font-family:'Fraunces',serif;font-size:22px;font-weight:500;color:var(--text);line-height:1;}
.kpi-unit{font-size:11px;color:var(--text-sub);margin-left:2px;}

/* ランキングカード */
.ranking-wrap{margin-bottom:1.25rem;}
.section-title{font-family:'Fraunces',serif;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold-light);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:"";flex:1;height:1px;background:rgba(255,255,255,0.06);}

.rank-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;transition:all 0.2s;}
.rank-card.rank-1{border-color:rgba(212,184,150,0.4);background:rgba(184,152,106,0.12);}
.rank-card.rank-2{border-color:rgba(160,160,170,0.3);background:rgba(160,160,170,0.06);}
.rank-card.rank-3{border-color:rgba(180,120,70,0.3);background:rgba(180,120,70,0.06);}
.rank-medal{font-size:24px;flex-shrink:0;width:36px;text-align:center;}
.rank-info{flex:1;min-width:0;}
.rank-name{font-size:14px;font-weight:700;color:var(--text);letter-spacing:0.04em;margin-bottom:4px;}
.rank-bar-wrap{display:flex;align-items:center;gap:8px;}
.rank-bar{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden;}
.rank-bar-fill{height:100%;border-radius:99px;transition:width 0.6s ease;}
.rank-amount{font-family:'Fraunces',serif;font-size:18px;font-weight:500;color:var(--text);white-space:nowrap;}
.rank-count{font-size:10px;color:var(--text-muted);margin-top:2px;}
.rank-badge{position:absolute;top:8px;right:10px;font-size:9px;padding:2px 8px;border-radius:99px;}

/* 案件一覧 */
.case-list{display:flex;flex-direction:column;gap:8px;}
.case-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.case-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.case-div{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:700;letter-spacing:0.06em;}
.case-date{font-size:11px;color:var(--text-muted);margin-left:auto;}
.case-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;}
.case-detail{font-size:11px;color:var(--text-sub);line-height:1.6;}
.case-amount{font-family:'Fraunces',serif;font-size:16px;color:var(--gold-light);margin-top:6px;}
.case-profit{font-size:11px;color:var(--green);margin-left:8px;}

/* 空の状態 */
.empty{text-align:center;padding:3rem 1rem;color:var(--text-muted);}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.3;}

/* 手動入力モーダル */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#3A342C;width:100%;max-width:600px;border-radius:16px 16px 0 0;padding:0 0 2rem;max-height:90vh;overflow-y:auto;animation:slideUp 0.25s ease;}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:99px;margin:12px auto 0;}
.modal-header{padding:1.25rem 1.5rem 0;}
.modal-title{font-family:'Shippori Mincho',serif;font-size:18px;font-weight:700;color:var(--text);}
.modal-body{padding:1rem 1.5rem;}
.mfield{margin-bottom:12px;}
.mfield label{display:block;font-size:10px;letter-spacing:0.12em;color:var(--text-muted);text-transform:uppercase;margin-bottom:5px;}
.mfield input,.mfield select,.mfield textarea{width:100%;padding:10px 12px;border:1px solid rgba(255,255,255,0.1);border-radius:6px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:13px;font-weight:300;color:var(--text);background:rgba(255,255,255,0.06);transition:all 0.15s;}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{outline:none;border-color:var(--gold);}
.mfield select option{background:#3A342C;}
.mfield-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-footer{padding:0 1.5rem;display:flex;gap:8px;}
.btn-cancel{flex:1;padding:12px;background:none;border:1px solid rgba(255,255,255,0.1);border-radius:8px;font-size:13px;color:var(--text-muted);cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;}
.btn-save{flex:2;padding:12px;background:var(--gold);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;}

/* FAB */
.fab{position:fixed;bottom:28px;right:20px;width:52px;height:52px;background:var(--gold);border:none;border-radius:50%;font-size:22px;color:#fff;cursor:pointer;box-shadow:0 4px 16px rgba(184,152,106,0.4);display:flex;align-items:center;justify-content:center;transition:all 0.2s;z-index:50;}
.fab:active{transform:scale(0.95);}
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">Rose Garden Co., Ltd</div>
  <div class="header-title">業績ランキング</div>
</header>

<!-- GAS設定 -->
<div class="gas-bar">
  <span style="font-size:11px;color:var(--gold);white-space:nowrap;">🔗 連携</span>
  <input type="text" class="gas-input" id="gas-url" placeholder="GAS URL を貼り付け"/>
  <button class="gas-btn" onclick="saveGasUrl()">保存</button>
  <button class="gas-btn secondary" onclick="fetchData()">📥 取得</button>
  <span class="gas-status" id="gas-status"></span>
</div>

<!-- 期間フィルター -->
<div class="period-tabs">
  <button class="period-tab active" onclick="setPeriod('month',this)" id="tab-month">今月</button>
  <button class="period-tab" onclick="setPeriod('week',this)">今週</button>
  <button class="period-tab" onclick="setPeriod('all',this)">累計</button>
</div>

<main class="main">

  <!-- KPI -->
  <div class="kpi-row" style="margin-top:1rem;">
    <div class="kpi-box">
      <div class="kpi-label">総売上</div>
      <div class="kpi-val" id="kpi-sales">—<span class="kpi-unit">万</span></div>
    </div>
    <div class="kpi-box">
      <div class="kpi-label">案件数</div>
      <div class="kpi-val" id="kpi-count">—<span class="kpi-unit">件</span></div>
    </div>
    <div class="kpi-box">
      <div class="kpi-label">粗利率</div>
      <div class="kpi-val" id="kpi-margin">—<span class="kpi-unit">%</span></div>
    </div>
  </div>

  <!-- 事業部ランキング -->
  <div class="ranking-wrap">
    <div class="section-title">事業部別 売上ランキング</div>
    <div id="ranking-list">
      <div class="empty"><div class="empty-icon">🏆</div>データを取得してください</div>
    </div>
  </div>

  <!-- 案件一覧 -->
  <div>
    <div class="section-title">案件一覧</div>
    <div class="case-list" id="case-list">
      <div class="empty"><div class="empty-icon">📋</div>データなし</div>
    </div>
  </div>

</main>

<!-- 手動入力FAB -->
<button class="fab" onclick="openModal()" title="手動入力">＋</button>

<!-- 手動入力モーダル -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header"><div class="modal-title">業績を入力</div></div>
    <div class="modal-body">
      <div class="mfield">
        <label>日付</label>
        <input type="date" id="m-date"/>
      </div>
      <div class="mfield-row">
        <div class="mfield">
          <label>事業部</label>
          <select id="m-div">
            <option value="">選択</option>
            <option>Misel</option>
            <option>IROHA</option>
            <option>OEM</option>
            <option>TSUBOMI</option>
            <option>mi.___&</option>
            <option>BLUEBERRYGWOOD</option>
          </select>
        </div>
        <div class="mfield">
          <label>担当者</label>
          <input type="text" id="m-staff" placeholder="例：緒方"/>
        </div>
      </div>
      <div class="mfield">
        <label>案件名</label>
        <input type="text" id="m-name" placeholder="例：池田さん（中野）"/>
      </div>
      <div class="mfield-row">
        <div class="mfield">
          <label>売上（円）</label>
          <input type="number" id="m-sales" placeholder="0" min="0"/>
        </div>
        <div class="mfield">
          <label>経費（円）</label>
          <input type="number" id="m-expense" placeholder="0" min="0"/>
        </div>
      </div>
      <div class="mfield">
        <label>作業者・メモ</label>
        <input type="text" id="m-memo" placeholder="例：前田、荒井、岡村 各6h"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveRecord()">✦ 保存・送信</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  定数
// ============================================================
const PROXY = 'https://irohad-proxy.bomi6587.workers.dev/';
const STORAGE_KEY = 'irohad_ranking_data';
const DIV_COLORS = {
  'Misel':'#B8986A','IROHA':'#2D7A4F','OEM':'#8C6EA8',
  'TSUBOMI':'#3A6EA8','mi.___&':'#C87E2A','BLUEBERRYGWOOD':'#5B7FA6'
};

let allData = [];
let currentPeriod = 'month';

// ============================================================
//  初期化
// ============================================================
function init(){
  // 今日の日付をモーダルにセット
  const d = new Date();
  document.getElementById('m-date').value =
    d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');

  // GAS URLを復元
  try {
    const saved = localStorage.getItem('irohad_ranking_gas_url');
    if(saved) document.getElementById('gas-url').value = saved;
  } catch(e){}

  // 起動時はGASから取得（ローカルの古いデータは使わない）
  allData = [];
  const savedGas = (function(){ try{ return localStorage.getItem('irohad_ranking_gas_url')||''; }catch(e){ return ''; } })();
  if(savedGas){
    fetchData();
  } else {
    render();
  }
}

// ============================================================
//  GAS連携
// ============================================================
function saveGasUrl(){
  const url = document.getElementById('gas-url').value.trim();
  if(!url) return;
  try{ localStorage.setItem('irohad_ranking_gas_url', url); }catch(e){}
  document.getElementById('gas-status').textContent = '✓ 保存';
  setTimeout(()=>{ document.getElementById('gas-status').textContent = ''; }, 2000);
}

async function fetchData(){
  let gasUrl = '';
  try{ gasUrl = localStorage.getItem('irohad_ranking_gas_url')||''; }catch(e){}
  if(!gasUrl){ alert('GAS URLを設定してください'); return; }
  document.getElementById('gas-status').textContent = '取得中…';
  try{
    const params = new URLSearchParams({ gasUrl, action:'getAll' });
    const res = await fetch(PROXY + '?' + params.toString());
    const json = await res.json();
    if(json.data){
      // スプレッドシートのデータで完全に置き換え（ローカルの古いデータは破棄）
      allData = json.data.map(r => ({
        date: String(r.date||'').slice(0,10),
        division: r.division||'',
        staff: r.staff||'',
        caseName: r.caseName||r.案件名||'',
        sales: Number(r.sales||r.売上||0),
        expense: Number(r.expense||r.経費||0),
        memo: r.memo||r.メモ||''
      }));
      try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(allData)); }catch(e){}
      document.getElementById('gas-status').textContent = '✓ '+allData.length+'件取得';
      render();
    }
  } catch(e){
    document.getElementById('gas-status').textContent = '⚠ '+e.message;
  }
}

async function sendToGAS(record){
  let gasUrl = '';
  try{ gasUrl = localStorage.getItem('irohad_ranking_gas_url')||''; }catch(e){}
  if(!gasUrl) return;
  try{
    const params = new URLSearchParams({
      gasUrl, action:'save',
      date: record.date||'',
      division: record.division||'',
      staff: record.staff||'',
      caseName: record.caseName||'',
      sales: record.sales||0,
      expense: record.expense||0,
      memo: record.memo||''
    });
    await fetch(PROXY + '?' + params.toString());
  } catch(e){ console.log('送信エラー:', e); }
}

// ============================================================
//  期間フィルター
// ============================================================
function setPeriod(p, btn){
  currentPeriod = p;
  document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function filterByPeriod(data){
  const now = new Date();
  return data.filter(r => {
    if(!r.date) return false;
    const d = new Date(r.date);
    if(currentPeriod === 'month'){
      return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
    } else if(currentPeriod === 'week'){
      const weekAgo = new Date(now); weekAgo.setDate(now.getDate()-7);
      return d >= weekAgo;
    }
    return true;
  });
}

// ============================================================
//  描画
// ============================================================
function render(){
  const data = filterByPeriod(allData);

  // KPI
  const totalSales = data.reduce((s,r) => s+(r.sales||0), 0);
  const totalExpense = data.reduce((s,r) => s+(r.expense||0), 0);
  const margin = totalSales > 0 ? Math.round((totalSales-totalExpense)/totalSales*100) : 0;
  document.getElementById('kpi-sales').innerHTML = (totalSales/10000).toFixed(1)+'<span class="kpi-unit">万</span>';
  document.getElementById('kpi-count').innerHTML = data.length+'<span class="kpi-unit">件</span>';
  document.getElementById('kpi-margin').innerHTML = (totalSales>0?margin:'—')+'<span class="kpi-unit">%</span>';

  // 事業部集計
  const divMap = {};
  data.forEach(r => {
    const d = r.division||'その他';
    if(!divMap[d]) divMap[d] = { sales:0, count:0 };
    divMap[d].sales += r.sales||0;
    divMap[d].count++;
  });
  const ranked = Object.entries(divMap).sort((a,b) => b[1].sales-a[1].sales);
  const maxSales = Math.max(...ranked.map(([,v]) => v.sales), 1);
  const medals = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣'];

  const rankEl = document.getElementById('ranking-list');
  if(ranked.length === 0){
    rankEl.innerHTML = '<div class="empty"><div class="empty-icon">🏆</div>データなし</div>';
  } else {
    rankEl.innerHTML = ranked.map(([name, v], i) => {
      const color = DIV_COLORS[name]||'#A09488';
      const pct = Math.round(v.sales/maxSales*100);
      return `<div class="rank-card rank-${i+1}">
        <div class="rank-medal">${medals[i]||'—'}</div>
        <div class="rank-info">
          <div class="rank-name" style="color:${color}">${name}</div>
          <div class="rank-bar-wrap">
            <div class="rank-bar"><div class="rank-bar-fill" style="width:${pct}%;background:${color};"></div></div>
          </div>
          <div class="rank-count">${v.count}件</div>
        </div>
        <div class="rank-amount">${(v.sales/10000).toFixed(1)}<span style="font-size:12px;color:var(--text-sub);">万円</span></div>
      </div>`;
    }).join('');
  }

  // 案件一覧
  const sorted = [...data].sort((a,b) => (b.date||'').localeCompare(a.date||''));
  const caseEl = document.getElementById('case-list');
  if(sorted.length === 0){
    caseEl.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>データなし</div>';
  } else {
    caseEl.innerHTML = sorted.map(r => {
      const color = DIV_COLORS[r.division]||'#A09488';
      const profit = (r.sales||0)-(r.expense||0);
      const margin = r.sales > 0 ? Math.round(profit/r.sales*100) : 0;
      return `<div class="case-card">
        <div class="case-header">
          <span class="case-div" style="background:${color}22;color:${color};border:1px solid ${color}44;">${r.division||'—'}</span>
          <span style="font-size:11px;color:var(--text-muted);">${r.staff||''}</span>
          <span class="case-date">${r.date?.slice(5).replace('-','/')||'—'}</span>
        </div>
        <div class="case-name">${r.caseName||'—'}</div>
        ${r.memo?`<div class="case-detail">${r.memo}</div>`:''}
        <div>
          <span class="case-amount">${(r.sales||0).toLocaleString()}円</span>
          ${r.expense?`<span class="case-profit">粗利 ${margin}%</span>`:''}
        </div>
      </div>`;
    }).join('');
  }
}

// ============================================================
//  手動入力
// ============================================================
function openModal(){
  document.getElementById('modal').classList.add('open');
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
}

async function saveRecord(){
  const date     = document.getElementById('m-date').value;
  const division = document.getElementById('m-div').value;
  const staff    = document.getElementById('m-staff').value.trim();
  const caseName = document.getElementById('m-name').value.trim();
  const sales    = parseFloat(document.getElementById('m-sales').value)||0;
  const expense  = parseFloat(document.getElementById('m-expense').value)||0;
  const memo     = document.getElementById('m-memo').value.trim();

  if(!division){ alert('事業部を選択してください'); return; }

  const record = { date, division, staff, caseName, sales, expense, memo };

  document.getElementById('gas-status').textContent = '送信中…';
  await sendToGAS(record);

  closeModal();

  // フォームリセット
  ['m-staff','m-name','m-sales','m-expense','m-memo'].forEach(id => {
    document.getElementById(id).value = '';
  });

  // 送信後にスプレッドシートから最新データを取得し直す
  setTimeout(() => { fetchData(); }, 1500);
}

// オーバーレイクリックで閉じる
document.getElementById('modal').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});

// PWA
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./service-worker.js');
}
document.addEventListener('DOMContentLoaded', function(){

  if(isApp){
    var btn = document.createElement('a');
    btn.href = './index.html';
    btn.style.cssText = 'position:fixed;bottom:24px;left:16px;z-index:9999;background:rgba(44,40,32,0.9);color:#D4B896;border:1px solid rgba(184,152,106,0.3);border-radius:99px;padding:8px 16px;font-size:11px;text-decoration:none;letter-spacing:0.1em;backdrop-filter:blur(8px);';
    btn.textContent = '⌂ HOME';
    document.body.appendChild(btn);
  }
});

init();
