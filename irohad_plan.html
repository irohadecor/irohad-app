<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#191512"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>蕾の脳内 — Case Study Notebook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F2ECE0;
  --paper2:#FBF7EF;
  --ink:#191512;
  --ink-soft:#5C5247;
  --muted:#8E8270;
  --accent:#BE4128;
  --accent-soft:#E9C6B7;
  --accent-bg:#F4E2D8;
  --line:#DAD0BE;
  --card:#FCFAF4;
  --green:#2D7A4F;
  --green-light:#E8F5EE;
  --blue:#3A6EA8;
  --blue-light:#EAF0FB;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:"Zen Kaku Gothic New",sans-serif;
  background:var(--paper);
  background-image:radial-gradient(circle at 18% -10%,#F8F2E6 0%,transparent 55%),radial-gradient(circle at 100% 8%,#EFE7D6 0%,transparent 45%);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ヘッダー */
.header{
  background:var(--ink);
  padding:1.5rem 1.5rem 1.25rem;
  position:sticky;top:0;z-index:50;
}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.header-brand{display:flex;flex-direction:column;}
.header-en{font-family:"Fraunces",serif;font-size:9px;letter-spacing:.3em;color:var(--accent-soft);text-transform:uppercase;margin-bottom:3px;}
.header-ja{font-family:"Shippori Mincho",serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:.06em;line-height:1.2;}
.header-sub{font-family:"Fraunces",serif;font-size:9px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;margin-top:3px;}
.new-btn{
  display:flex;align-items:center;gap:6px;
  padding:9px 16px;background:var(--accent);color:#fff;
  border:none;border-radius:8px;font-family:"Zen Kaku Gothic New",sans-serif;
  font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;
  letter-spacing:.04em;
}
.new-btn:active{transform:scale(.96);}

/* カテゴリタブ */
.cat-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{
  padding:6px 14px;border-radius:99px;font-size:11px;font-weight:700;
  letter-spacing:.06em;white-space:nowrap;cursor:pointer;transition:all 0.2s;
  border:1.5px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);
  background:none;font-family:"Zen Kaku Gothic New",sans-serif;
}
.cat-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* メイン */
.main{max-width:600px;margin:0 auto;padding:1.25rem 1.25rem 6rem;}

/* 検索 */
.search-wrap{position:relative;margin-bottom:1.25rem;}
.search-input{
  width:100%;padding:10px 14px 10px 36px;
  border:1px solid var(--line);border-radius:10px;
  font-family:"Zen Kaku Gothic New",sans-serif;font-size:13px;font-weight:300;
  color:var(--ink);background:var(--card);transition:all 0.15s;
}
.search-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(190,65,40,0.1);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);pointer-events:none;}

/* ノートカード */
.notes-list{display:flex;flex-direction:column;gap:10px;}
.note-card{
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  overflow:hidden;cursor:pointer;transition:all 0.2s;
}
.note-card:hover{border-color:var(--accent-soft);box-shadow:0 6px 20px -10px rgba(190,65,40,0.2);}
.note-card:active{transform:scale(.99);}
.note-card-inner{padding:14px 16px;}
.note-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.note-cat-badge{
  font-size:10px;font-weight:700;padding:2px 10px;border-radius:99px;
  letter-spacing:.06em;
}
.cat-insight{background:#F4E2D8;color:var(--accent);}
.cat-case{background:var(--blue-light);color:var(--blue);}
.cat-idea{background:var(--green-light);color:var(--green);}
.cat-inspo{background:#F5F0E8;color:var(--ink-soft);}
.note-date{font-family:"Fraunces",serif;font-size:11px;color:var(--muted);margin-left:auto;}
.note-title{font-family:"Shippori Mincho",serif;font-weight:700;font-size:16px;line-height:1.45;color:var(--ink);margin-bottom:6px;}
.note-preview{font-size:12px;color:var(--muted);line-height:1.65;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.note-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
.note-tag{font-size:10px;padding:2px 8px;border-radius:99px;background:var(--paper);color:var(--muted);border:1px solid var(--line);}
.note-footer{
  padding:9px 16px;border-top:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(242,236,224,0.4);
}
.note-brand{font-size:10px;color:var(--muted);letter-spacing:.06em;}
.note-actions{display:flex;gap:8px;}
.note-action-btn{
  background:none;border:none;font-size:13px;cursor:pointer;
  color:var(--muted);padding:2px 4px;transition:all 0.15s;
}
.note-action-btn:hover{color:var(--accent);}

/* 空の状態 */
.empty-state{text-align:center;padding:4rem 1rem;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.4;}
.empty-title{font-family:"Shippori Mincho",serif;font-size:18px;color:var(--ink-soft);margin-bottom:6px;}
.empty-sub{font-size:12px;line-height:1.7;}

/* モーダル：新規作成・編集 */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(25,21,18,0.7);z-index:200;
  align-items:flex-end;justify-content:center;
  padding:0;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--paper2);width:100%;max-width:600px;
  border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;
  animation:slideUp 0.3s cubic-bezier(.2,.7,.2,1);
}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:var(--line);border-radius:99px;margin:12px auto 0;}
.modal-header{padding:1.25rem 1.5rem 0;}
.modal-title{font-family:"Shippori Mincho",serif;font-size:20px;font-weight:700;color:var(--ink);letter-spacing:.04em;}
.modal-body{padding:1rem 1.5rem 1.5rem;}

/* フォーム */
.mfield{margin-bottom:14px;}
.mfield label{display:block;font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:5px;font-weight:700;}
.mfield input,.mfield textarea,.mfield select{
  width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;
  font-family:"Zen Kaku Gothic New",sans-serif;font-size:13px;font-weight:300;
  color:var(--ink);background:var(--card);transition:all 0.15s;
  -webkit-appearance:none;appearance:none;
}
.mfield input:focus,.mfield textarea:focus,.mfield select:focus{
  outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(190,65,40,0.1);
}
.mfield textarea{resize:vertical;min-height:140px;line-height:1.75;}

/* カテゴリ選択ボタン */
.cat-select{display:flex;gap:8px;flex-wrap:wrap;}
.cat-sel-btn{
  padding:7px 16px;border-radius:99px;font-size:12px;font-weight:700;
  border:1.5px solid var(--line);background:var(--card);color:var(--muted);
  cursor:pointer;transition:all 0.15s;font-family:"Zen Kaku Gothic New",sans-serif;
  letter-spacing:.04em;
}
.cat-sel-btn.selected-insight{background:#F4E2D8;border-color:var(--accent);color:var(--accent);}
.cat-sel-btn.selected-case{background:var(--blue-light);border-color:var(--blue);color:var(--blue);}
.cat-sel-btn.selected-idea{background:var(--green-light);border-color:var(--green);color:var(--green);}
.cat-sel-btn.selected-inspo{background:#F5F0E8;border-color:var(--ink-soft);color:var(--ink-soft);}

/* ブランドチップ */
.brand-select{display:flex;gap:6px;flex-wrap:wrap;}
.brand-chip{
  padding:5px 12px;border-radius:99px;font-size:11px;font-weight:700;
  border:1.5px solid var(--line);background:var(--card);color:var(--muted);
  cursor:pointer;transition:all 0.15s;font-family:"Zen Kaku Gothic New",sans-serif;
}
.brand-chip.selected{background:var(--ink);border-color:var(--ink);color:#fff;}

.modal-footer{
  padding:0 1.5rem 2rem;display:flex;gap:10px;
}
.btn-cancel{
  flex:1;padding:12px;background:none;border:1.5px solid var(--line);
  border-radius:10px;font-size:13px;color:var(--muted);cursor:pointer;
  font-family:"Zen Kaku Gothic New",sans-serif;font-weight:500;
}
.btn-save{
  flex:2;padding:12px;background:var(--accent);color:#fff;
  border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;
  font-family:"Zen Kaku Gothic New",sans-serif;letter-spacing:.04em;transition:all 0.2s;
}
.btn-save:active{transform:scale(.98);}

/* 詳細モーダル */
.detail-modal{
  display:none;position:fixed;inset:0;
  background:rgba(25,21,18,0.7);z-index:300;
  align-items:flex-end;justify-content:center;
}
.detail-modal.open{display:flex;}
.detail-inner{
  background:var(--paper2);width:100%;max-width:600px;
  border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;
  animation:slideUp 0.3s cubic-bezier(.2,.7,.2,1);
  padding:0 0 3rem;
}
.detail-header{padding:1.5rem 1.5rem 1rem;}
.detail-cat-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.detail-date{font-family:"Fraunces",serif;font-size:11px;color:var(--muted);}
.detail-title{font-family:"Shippori Mincho",serif;font-size:22px;font-weight:800;line-height:1.4;color:var(--ink);margin-bottom:10px;}
.detail-brand-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.detail-brand-tag{font-size:10px;padding:2px 10px;border-radius:99px;background:var(--ink);color:var(--accent-soft);}
.detail-divider{height:1px;background:var(--line);margin:0 1.5rem 1.25rem;}
.detail-body{padding:0 1.5rem;font-size:13px;line-height:1.9;color:var(--ink-soft);white-space:pre-wrap;}
.detail-tags-wrap{padding:1rem 1.5rem 0;}
.detail-footer{padding:1.25rem 1.5rem 0;display:flex;gap:8px;}
.detail-edit-btn{
  flex:1;padding:11px;background:var(--ink);color:#fff;border:none;
  border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;
  font-family:"Zen Kaku Gothic New",sans-serif;
}
.detail-del-btn{
  padding:11px 18px;background:none;border:1.5px solid var(--line);
  border-radius:10px;font-size:12px;color:var(--muted);cursor:pointer;
  font-family:"Zen Kaku Gothic New",sans-serif;
}
.detail-close-btn{
  padding:11px 18px;background:none;border:1.5px solid var(--line);
  border-radius:10px;font-size:12px;color:var(--muted);cursor:pointer;
  font-family:"Zen Kaku Gothic New",sans-serif;
}

/* カウント */
.count-bar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.count-text{font-family:"Fraunces",serif;font-size:12px;color:var(--muted);letter-spacing:.06em;}

@media(min-width:600px){
  .modal,.detail-inner{border-radius:20px;margin-bottom:2rem;max-height:88vh;}
  .modal-overlay,.detail-modal{align-items:center;}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="header-brand">
      <span class="header-en">Case Study Notebook</span>
      <span class="header-ja">蕾の脳内</span>
      <span class="header-sub">Rose Garden Co., Ltd</span>
    </div>
    <button class="new-btn" onclick="openNewModal()">＋ 新しいメモ</button>
  </div>
  <div class="cat-tabs">
    <button class="cat-tab active" onclick="setFilter('all',this)">すべて</button>
    <button class="cat-tab" onclick="setFilter('insight',this)">💡 気づき</button>
    <button class="cat-tab" onclick="setFilter('case',this)">📁 案件ふりかえり</button>
    <button class="cat-tab" onclick="setFilter('idea',this)">🌱 アイデア</button>
    <button class="cat-tab" onclick="setFilter('inspo',this)">✨ インスピレーション</button>
  </div>
</header>

<main class="main">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" placeholder="メモを検索…" oninput="renderNotes()" id="search-input"/>
  </div>
  <div class="count-bar">
    <span class="count-text" id="count-text">0 notes</span>
  </div>
  <div class="notes-list" id="notes-list"></div>
</main>

<!-- 新規・編集モーダル -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title">新しいメモ</div>
    </div>
    <div class="modal-body">

      <div class="mfield">
        <label>カテゴリ</label>
        <div class="cat-select">
          <button class="cat-sel-btn" onclick="selectCat('insight',this)">💡 気づき</button>
          <button class="cat-sel-btn" onclick="selectCat('case',this)">📁 案件ふりかえり</button>
          <button class="cat-sel-btn" onclick="selectCat('idea',this)">🌱 アイデア</button>
          <button class="cat-sel-btn" onclick="selectCat('inspo',this)">✨ インスピレーション</button>
        </div>
      </div>

      <div class="mfield">
        <label>タイトル</label>
        <input type="text" id="m-title" placeholder="例：見積もりで気づいたこと・〇〇様案件ふりかえり"/>
      </div>

      <div class="mfield">
        <label>内容</label>
        <textarea id="m-body" placeholder="気づき・学び・改善点・アイデア…何でも書いてください"></textarea>
      </div>

      <div class="mfield">
        <label>関連ブランド（複数選択可）</label>
        <div class="brand-select">
          <span class="brand-chip" onclick="toggleBrand('IROHA',this)">IROHA</span>
          <span class="brand-chip" onclick="toggleBrand('Misel',this)">Misel</span>
          <span class="brand-chip" onclick="toggleBrand('TSUBOMI',this)">TSUBOMI</span>
          <span class="brand-chip" onclick="toggleBrand('ポピー',this)">ポピー</span>
          <span class="brand-chip" onclick="toggleBrand('mi.＆',this)">mi.＆</span>
          <span class="brand-chip" onclick="toggleBrand('arinomama',this)">arinomama</span>
          <span class="brand-chip" onclick="toggleBrand('結',this)">結</span>
          <span class="brand-chip" onclick="toggleBrand('全社',this)">全社</span>
        </div>
      </div>

      <div class="mfield">
        <label>タグ（カンマ区切りで入力）</label>
        <input type="text" id="m-tags" placeholder="例：見積もり, 顧客対応, 改善"/>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEditModal()">キャンセル</button>
      <button class="btn-save" onclick="saveNote()">✦ 保存する</button>
    </div>
  </div>
</div>

<!-- 詳細モーダル -->
<div class="detail-modal" id="detail-modal">
  <div class="detail-inner">
    <div class="modal-handle"></div>
    <div class="detail-header">
      <div class="detail-cat-row">
        <span id="detail-cat-badge" class="note-cat-badge"></span>
        <span class="detail-date" id="detail-date"></span>
      </div>
      <div class="detail-title" id="detail-title"></div>
      <div class="detail-brand-row" id="detail-brands"></div>
    </div>
    <div class="detail-divider"></div>
    <div class="detail-body" id="detail-body"></div>
    <div class="detail-tags-wrap" id="detail-tags"></div>
    <div class="detail-footer">
      <button class="detail-edit-btn" onclick="editCurrentNote()">編集する</button>
      <button class="detail-del-btn" onclick="deleteCurrentNote()">削除</button>
      <button class="detail-close-btn" onclick="closeDetailModal()">閉じる</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  データ管理
// ============================================================
const STORAGE_KEY = 'irohad_notebook';

function loadNotes(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }catch(e){ return []; }
}
function saveNotes(data){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }catch(e){}
}

// ============================================================
//  状態
// ============================================================
let currentFilter = 'all';
let currentEditId = null;
let currentDetailId = null;
let selectedCat = '';
let selectedBrands = [];

const CAT_LABELS = {
  insight: '💡 気づき',
  case: '📁 案件ふりかえり',
  idea: '🌱 アイデア',
  inspo: '✨ インスピレーション',
};
const CAT_BADGE_CLASS = {
  insight: 'cat-insight',
  case: 'cat-case',
  idea: 'cat-idea',
  inspo: 'cat-inspo',
};

// ============================================================
//  フィルター
// ============================================================
function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderNotes();
}

// ============================================================
//  ノート描画
// ============================================================
function renderNotes(){
  const all = loadNotes();
  const q = document.getElementById('search-input').value.trim().toLowerCase();

  let filtered = all.filter(n => {
    if(currentFilter !== 'all' && n.cat !== currentFilter) return false;
    if(q){
      return n.title.toLowerCase().includes(q) ||
             n.body.toLowerCase().includes(q) ||
             (n.tags||[]).some(t => t.toLowerCase().includes(q)) ||
             (n.brands||[]).some(b => b.toLowerCase().includes(q));
    }
    return true;
  }).sort((a,b) => b.createdAt.localeCompare(a.createdAt));

  const countEl = document.getElementById('count-text');
  countEl.textContent = filtered.length + ' note' + (filtered.length !== 1 ? 's' : '');

  const list = document.getElementById('notes-list');
  if(filtered.length === 0){
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📓</div>
        <div class="empty-title">まだメモがありません</div>
        <div class="empty-sub">「＋ 新しいメモ」から気づきや学びを記録しましょう</div>
      </div>`;
    return;
  }

  list.innerHTML = filtered.map(n => `
    <div class="note-card" onclick="openDetail('${n.id}')">
      <div class="note-card-inner">
        <div class="note-meta">
          <span class="note-cat-badge ${CAT_BADGE_CLASS[n.cat]||''}">${CAT_LABELS[n.cat]||n.cat}</span>
          <span class="note-date">${formatDate(n.createdAt)}</span>
        </div>
        <div class="note-title">${escHtml(n.title)}</div>
        <div class="note-preview">${escHtml(n.body)}</div>
        ${n.tags&&n.tags.length>0?`<div class="note-tags">${n.tags.map(t=>`<span class="note-tag">${escHtml(t)}</span>`).join('')}</div>`:''}
      </div>
      <div class="note-footer">
        <span class="note-brand">${(n.brands||[]).join(' · ')||'—'}</span>
        <div class="note-actions">
          <button class="note-action-btn" onclick="event.stopPropagation();editNote('${n.id}')">✏️</button>
          <button class="note-action-btn" onclick="event.stopPropagation();deleteNote('${n.id}')">🗑</button>
        </div>
      </div>
    </div>
  `).join('');
}

// ============================================================
//  新規・編集モーダル
// ============================================================
function openNewModal(){
  currentEditId = null;
  selectedCat = '';
  selectedBrands = [];
  document.getElementById('modal-title').textContent = '新しいメモ';
  document.getElementById('m-title').value = '';
  document.getElementById('m-body').value = '';
  document.getElementById('m-tags').value = '';
  document.querySelectorAll('.cat-sel-btn').forEach(b => b.className = 'cat-sel-btn');
  document.querySelectorAll('.brand-chip').forEach(b => b.classList.remove('selected'));
  document.getElementById('edit-modal').classList.add('open');
}

function editNote(id){
  const n = loadNotes().find(n => n.id === id);
  if(!n) return;
  currentEditId = id;
  selectedCat = n.cat;
  selectedBrands = [...(n.brands||[])];
  document.getElementById('modal-title').textContent = 'メモを編集';
  document.getElementById('m-title').value = n.title;
  document.getElementById('m-body').value = n.body;
  document.getElementById('m-tags').value = (n.tags||[]).join(', ');
  // カテゴリ
  document.querySelectorAll('.cat-sel-btn').forEach(b => {
    b.className = 'cat-sel-btn';
    const c = b.getAttribute('onclick').match(/'(\w+)'/)?.[1];
    if(c === n.cat) b.classList.add('selected-'+n.cat);
  });
  // ブランド
  document.querySelectorAll('.brand-chip').forEach(b => {
    const br = b.getAttribute('onclick').match(/'([^']+)'/)?.[1];
    b.classList.toggle('selected', selectedBrands.includes(br));
  });
  document.getElementById('edit-modal').classList.add('open');
}

function editCurrentNote(){
  closeDetailModal();
  editNote(currentDetailId);
}

function closeEditModal(){
  document.getElementById('edit-modal').classList.remove('open');
}

function selectCat(cat, btn){
  selectedCat = cat;
  document.querySelectorAll('.cat-sel-btn').forEach(b => b.className = 'cat-sel-btn');
  btn.classList.add('selected-'+cat);
}

function toggleBrand(brand, el){
  if(selectedBrands.includes(brand)){
    selectedBrands = selectedBrands.filter(b => b !== brand);
    el.classList.remove('selected');
  } else {
    selectedBrands.push(brand);
    el.classList.add('selected');
  }
}

function saveNote(){
  const title = document.getElementById('m-title').value.trim();
  const body = document.getElementById('m-body').value.trim();
  if(!title){ alert('タイトルを入力してください'); return; }
  if(!selectedCat){ alert('カテゴリを選択してください'); return; }

  const tags = document.getElementById('m-tags').value
    .split(',').map(t => t.trim()).filter(t => t);

  let notes = loadNotes();
  if(currentEditId){
    notes = notes.map(n => n.id === currentEditId
      ? {...n, title, body, cat:selectedCat, brands:[...selectedBrands], tags, updatedAt:new Date().toISOString()}
      : n
    );
  } else {
    notes.push({
      id: 'n'+Date.now(),
      title, body, cat:selectedCat,
      brands:[...selectedBrands], tags,
      createdAt: new Date().toISOString(),
    });
  }
  saveNotes(notes);
  closeEditModal();
  renderNotes();
}

// ============================================================
//  詳細モーダル
// ============================================================
function openDetail(id){
  const n = loadNotes().find(n => n.id === id);
  if(!n) return;
  currentDetailId = id;
  document.getElementById('detail-cat-badge').textContent = CAT_LABELS[n.cat]||n.cat;
  document.getElementById('detail-cat-badge').className = 'note-cat-badge '+(CAT_BADGE_CLASS[n.cat]||'');
  document.getElementById('detail-date').textContent = formatDate(n.createdAt);
  document.getElementById('detail-title').textContent = n.title;
  document.getElementById('detail-body').textContent = n.body;
  document.getElementById('detail-brands').innerHTML = (n.brands||[]).map(b =>
    `<span class="detail-brand-tag">${escHtml(b)}</span>`).join('');
  document.getElementById('detail-tags').innerHTML = (n.tags||[]).length > 0
    ? `<div class="note-tags" style="margin-top:0;">${n.tags.map(t=>`<span class="note-tag">${escHtml(t)}</span>`).join('')}</div>` : '';
  document.getElementById('detail-modal').classList.add('open');
}

function closeDetailModal(){
  document.getElementById('detail-modal').classList.remove('open');
}

function deleteCurrentNote(){
  if(!confirm('このメモを削除しますか？')) return;
  deleteNote(currentDetailId);
  closeDetailModal();
}

function deleteNote(id){
  if(!confirm('このメモを削除しますか？')) return;
  saveNotes(loadNotes().filter(n => n.id !== id));
  renderNotes();
}

// ============================================================
//  ユーティリティ
// ============================================================
function formatDate(iso){
  const d = new Date(iso);
  return d.getFullYear()+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getDate().toString().padStart(2,'0');
}
function escHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// オーバーレイクリックで閉じる
document.getElementById('edit-modal').addEventListener('click', function(e){
  if(e.target === this) closeEditModal();
});
document.getElementById('detail-modal').addEventListener('click', function(e){
  if(e.target === this) closeDetailModal();
});

// Service Worker
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./service-worker.js");
}
document.addEventListener("DOMContentLoaded", function(){
  var isApp = window.navigator.standalone || window.matchMedia("(display-mode: standalone)").matches;
  if(isApp){
    var btn = document.createElement("a");
    btn.href = "./index.html";
    btn.style.cssText = "position:fixed;bottom:24px;right:16px;z-index:9999;background:rgba(25,21,18,0.9);color:#E9C6B7;border:1px solid rgba(190,65,40,0.4);border-radius:99px;padding:8px 16px;font-size:11px;text-decoration:none;letter-spacing:0.1em;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,0.3);font-family:'Zen Kaku Gothic New',sans-serif;";
    btn.textContent = "⌂ HOME";
    document.body.appendChild(btn);
  }
});

// 初期表示
renderNotes();
</script>
